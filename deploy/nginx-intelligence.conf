# /etc/nginx/sites-available/lumora-intelligence
# Lumora Intelligence Mikro Servis — Nginx Reverse Proxy
#
# Kurulum:
#   sudo cp deploy/nginx-intelligence.conf /etc/nginx/sites-available/lumora-intelligence
#   sudo ln -s /etc/nginx/sites-available/lumora-intelligence /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name intelligence.yourdomain.com;

    # HTTP → HTTPS yönlendir (Let's Encrypt sonrası)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name intelligence.yourdomain.com;

    # Let's Encrypt sertifikaları (certbot otomatik doldurur)
    ssl_certificate     /etc/letsencrypt/live/intelligence.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intelligence.yourdomain.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Swagger UI'yi production'da gizle (APP_ENV=production ise zaten kapalı)
    location /docs { return 404; }
    location /redoc { return 404; }

    # /health herkese açık (monitoring için)
    location /health {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Diğer tüm endpoint'ler — X-Internal-Key zorunlu (middleware kontrol eder)
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;   # Nightly batch uzun sürebilir
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        # Büyük payload: 100 KB yeterli (Intelligence body'leri küçük)
        client_max_body_size 100k;
    }
}
